name: Build and Push steamcmd

on:
  push:
    branches:
      - main
    paths:
      - 'utils/steamcmd/Dockerfile'
  workflow_dispatch:

env:
  REGISTRY: ${{ vars.REGISTRY_NAME }}.azurecr.io
  IMAGE_NAME: steamcmd

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure Container Registry login
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az acr login --name ${{ vars.REGISTRY_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: utils/steamcmd
          file: utils/steamcmd/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}
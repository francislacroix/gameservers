name: Build and Push dragonwilds

on:
  push:
    branches:
      - main
    paths:
      - 'serverimages/dragonwilds/Dockerfile'
  workflow_dispatch:

env:
  REGISTRY: ${{ vars.REGISTRY_NAME }}.azurecr.io
  IMAGE_NAME: dragonwilds

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: serverimages/dragonwilds
          file: serverimages/dragonwilds/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}

name: Build and Push dragonwilds

on:
  push:
    branches:
      - main
    paths:
      - 'serverimages/dragonwilds/Dockerfile'
  workflow_dispatch:

env:
  REGISTRY: ${{ vars.REGISTRY_NAME }}.azurecr.io
  BASE_IMAGE: ${{ vars.REGISTRY_NAME }}.azurecr.io/steamcmd:4
  IMAGE_NAME: dragonwilds

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR Access Token
        id: get-acr-token
        run: |
          ACR_TOKEN=$(az acr login --name ${{ vars.REGISTRY_NAME }} --expose-token --output tsv --query accessToken)
          echo "::add-mask::$ACR_TOKEN" # mask the token in workflow logs
          echo "token=$ACR_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: 00000000-0000-0000-0000-000000000000
          password: ${{ steps.get-acr-token.outputs.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: serverimages/dragonwilds
          file: serverimages/dragonwilds/Dockerfile
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}

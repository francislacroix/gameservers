name: Deploy Dragonwilds Container App

on:
  push:
    branches:
      - main
    paths:
      - 'gameservers/dragonwilds/**'
  workflow_dispatch:
    inputs:
      resource_group:
        description: 'Target resource group name'
        required: true
        default: 'gameservers'

env:
  AZURE_REGION: ${{ vars.AZURE_REGION }}
  RESOURCE_GROUP: ${{ github.event_name == 'workflow_dispatch' && inputs.resource_group || vars.RESOURCE_GROUP }}
  TEMPLATE: 'infra/gameserver/main.bicep'
  PARAMETERS: 'gameservers/dragonwilds/main.bicepparam'
  STORAGE_ACCOUNT_NAME: ${{ vars.STORAGE_ACCOUNT_NAME }}
  CONTAINER_APPS_ENVIRONMENT_NAME: ${{ vars.CONTAINER_APPS_ENV_NAME }}
  CONTAINER_REGISTRY: ${{ vars.REGISTRY_NAME }}.azurecr.io
  MANAGED_IDENTITY_NAME: ${{ vars.CONTAINER_IMAGE_PULL_IDENTITY_NAME }}

jobs:
  validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate deployment
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          region: ${{ env.AZURE_REGION }}
          template: ${{ env.TEMPLATE }}
          parameters: >-
            ${{ env.PARAMETERS }}
            storageAccountName=${{ env.STORAGE_ACCOUNT_NAME }}
            containerAppsEnvironmentName=${{ env.CONTAINER_APPS_ENVIRONMENT_NAME }}
            containerRegistry=${{ env.CONTAINER_REGISTRY }}
            imagePullIdentityName=${{ env.MANAGED_IDENTITY_NAME }}
          deploymentMode: Validate
          deploymentName: dragonwilds-validate-${{ github.run_id }}

  what-if:
    name: What-If
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: What-If
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group what-if \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --template-file ${{ env.TEMPLATE }} \
              --parameters ${{ env.PARAMETERS }} \
              --parameters storageAccountName=${{ env.STORAGE_ACCOUNT_NAME }} \
              --parameters containerAppsEnvironmentName=${{ env.CONTAINER_APPS_ENVIRONMENT_NAME }} \
              --parameters containerRegistry=${{ env.CONTAINER_REGISTRY }} \
              --parameters imagePullIdentityName=${{ env.MANAGED_IDENTITY_NAME }} \
              --name dragonwilds-whatif-${{ github.run_id }} \
              --mode Incremental

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: what-if
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy dragonwilds container app
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          region: ${{ env.AZURE_REGION }}
          template: ${{ env.TEMPLATE }}
          parameters: >-
            ${{ env.PARAMETERS }}
            storageAccountName=${{ env.STORAGE_ACCOUNT_NAME }}
            containerAppsEnvironmentName=${{ env.CONTAINER_APPS_ENVIRONMENT_NAME }}
            containerRegistry=${{ env.CONTAINER_REGISTRY }}
            imagePullIdentityName=${{ env.MANAGED_IDENTITY_NAME }}
          deploymentMode: Incremental
          deploymentName: dragonwilds-${{ github.run_id }}
          failOnStdErr: true